name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - deploy

jobs:
  sync-secrets:
    name: Sync Secrets from Infisical
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync secrets
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/sync-github-secrets.sh

  deploy:
    needs: [sync-secrets]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          GH_PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
          GH_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          get_secret() {
            curl -fsSL \
              -H "Authorization: Bearer $INFISICAL_TOKEN" \
              "https://app.infisical.com/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=/" \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['secret']['secretValue'], end='')" 2>/dev/null || true
          }
          # Debug: check raw Infisical response (no secret values printed)
          echo "--- Infisical debug ---"
          curl -sS \
            -H "Authorization: Bearer $INFISICAL_TOKEN" \
            "https://app.infisical.com/api/v3/secrets/raw/CLOUDFLARE_API_TOKEN?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=/" \
            2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); d.get('secret') and print('CLOUDFLARE_API_TOKEN: found') or print('CLOUDFLARE_API_TOKEN: not found —', d)" 2>/dev/null || echo "CLOUDFLARE_API_TOKEN: curl/parse failed"
          echo "-----------------------"
          PROXY_SECRET=$(get_secret PROXY_SECRET)
          CLOUDFLARE_API_TOKEN=$(get_secret CLOUDFLARE_API_TOKEN)
          STRIPE_WEBHOOK_SECRET=$(get_secret STRIPE_WEBHOOK_SECRET)
          STRIPE_SECRET_KEY=$(get_secret STRIPE_SECRET_KEY)
          # Fall back to GitHub secrets if Infisical returns empty
          echo "PROXY_SECRET=${PROXY_SECRET:-$GH_PROXY_SECRET}" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-$GH_CLOUDFLARE_API_TOKEN}" >> $GITHUB_ENV
          echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" >> $GITHUB_ENV
          echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate with Google
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json

      - name: Inject secrets into Code.js
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('Code.js', 'utf8');
            fs.writeFileSync('Code.js', content.replace('PROXY_SECRET_INJECT', process.env.PROXY_SECRET));
          "

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy as Add-on
        env:
          CLASP_DEPLOYMENT_ID: ${{ secrets.DEPLOYMENT_ID }}
        run: |
          clasp deploy --deploymentId $CLASP_DEPLOYMENT_ID --description "Production deployment - $(date +'%Y-%m-%d')"

      - name: Sync Cloudflare Worker secrets
        run: |
          echo "$STRIPE_WEBHOOK_SECRET" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
          echo "$STRIPE_SECRET_KEY"     | npx wrangler secret put STRIPE_SECRET_KEY

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy
