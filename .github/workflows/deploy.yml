name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - deploy

jobs:
  sync-secrets:
    name: Sync Secrets from Infisical
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync secrets
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/sync-github-secrets.sh

  deploy:
    needs: [sync-secrets]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: |
          get_secret() {
            curl -fsSL \
              -H "Authorization: Bearer $INFISICAL_TOKEN" \
              "https://app.infisical.com/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=production&secretPath=/" \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['secret']['secretValue'], end='')" 2>/dev/null || true
          }
          echo "PROXY_SECRET=$(get_secret PROXY_SECRET)" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN=$(get_secret CLOUDFLARE_API_TOKEN)" >> $GITHUB_ENV
          echo "CLASP_CREDENTIALS=$(get_secret CLASP_CREDENTIALS)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate with Google
        run: |
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json

      - name: Inject secrets into Code.js
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('Code.js', 'utf8');
            fs.writeFileSync('Code.js', content.replace('PROXY_SECRET_INJECT', process.env.PROXY_SECRET));
          "

      - name: Push to Apps Script
        run: clasp push --force

      - name: Create new version
        run: |
          VERSION_DESC="2.0.3"
          clasp version "$VERSION_DESC"

      - name: Deploy as Add-on
        run: |
          clasp deploy --description "Production deployment - $(date +'%Y-%m-%d')"

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy
