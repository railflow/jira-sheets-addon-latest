<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                        card: {
                            DEFAULT: "hsl(var(--card))",
                            foreground: "hsl(var(--card-foreground))",
                        },
                    },
                    borderRadius: {
                        lg: `var(--radius)`,
                        md: `calc(var(--radius) - 2px)`,
                        sm: "calc(var(--radius) - 4px)",
                    },
                },
            },
        }
    </script>
    <style>
        @layer base {
            :root {
                --background: 0 0% 100%;
                --foreground: 240 10% 3.9%;
                --card: 0 0% 100%;
                --card-foreground: 240 10% 3.9%;
                --primary: 240 5.9% 10%;
                --primary-foreground: 0 0% 98%;
                --secondary: 240 4.8% 95.9%;
                --secondary-foreground: 240 5.9% 10%;
                --muted: 240 4.8% 95.9%;
                --muted-foreground: 240 3.8% 46.1%;
                --accent: 240 4.8% 95.9%;
                --accent-foreground: 240 5.9% 10%;
                --destructive: 0 84.2% 60.2%;
                --destructive-foreground: 0 0% 98%;
                --border: 240 5.9% 90%;
                --input: 240 5.9% 90%;
                --ring: 240 5.9% 10%;
                --radius: 0.5rem;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Custom scrollbar for better look in Sidebar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        button.ghost:active {
            background: transparent;
        }

        @keyframes flash {
            0% {
                opacity: 0.5;
                transform: scale(0.98);
            }

            50% {
                opacity: 1;
                transform: scale(1.02);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-flash {
            animation: flash 0.3s ease-in-out;
        }

        .animation-fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        .animation-slide-up {
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(12px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-background text-foreground p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // Injected from Apps Script Template
        const INITIAL_MODE = "<?= initialMode ?>";
        const USER_EMAIL = "<?= userEmail ?>";
        const CLOUDFLARE_WORKER_URL = "https://jira-proxy.railflow.workers.dev";

        /* --- COMPONENTS --- */
        const cn = (...classes) => classes.filter(Boolean).join(' ');
        const cleanColumn = (name) => name ? name.toString().replace(/\s*\([A-Z]+\)$/, '').trim() : '';

        const Button = ({ className, variant = "default", size = "default", children, ...props }) => {
            const variants = {
                default: "bg-primary text-primary-foreground hover:bg-primary/90",
                destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
                outline: "border border-input bg-background hover:bg-accent hover:text-accent-foreground",
                secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80 border border-input",
                ghost: "hover:bg-accent hover:text-accent-foreground",
            };
            const sizes = {
                default: "h-9 px-4 py-2",
                sm: "h-8 rounded-md px-3 text-xs",
                lg: "h-10 rounded-md px-8",
                icon: "h-9 w-9",
            };
            return (
                <button
                    className={cn(
                        "inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50",
                        variants[variant],
                        sizes[size],
                        className
                    )}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        const Input = ({ className, ...props }) => (
            <input className={cn("flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50", className)} {...props} />
        );

        const Textarea = ({ className, ...props }) => (
            <textarea className={cn("flex min-h-[60px] w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50", className)} {...props} />
        );

        const Label = ({ className, children, ...props }) => (
            <label className={cn("text-xs font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70", className)} {...props}>
                {children}
            </label>
        );


        const Switch = ({ checked, onCheckedChange, disabled }) => (
            <button
                type="button"
                role="switch"
                aria-checked={checked}
                disabled={disabled}
                onClick={() => !disabled && onCheckedChange(!checked)}
                className={cn(
                    "peer inline-flex h-5 w-9 shrink-0 cursor-pointer items-center rounded-full border-2 border-transparent transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50",
                    checked ? "bg-primary" : "bg-input"
                )}
            >
                <span
                    className={cn(
                        "pointer-events-none block h-4 w-4 rounded-full bg-background shadow-lg ring-0 transition-transform",
                        checked ? "translate-x-4" : "translate-x-0"
                    )}
                />
            </button>
        );

        const Select = ({ value, onChange, options, disabled, className }) => (
            <div className={cn("relative", className)}>
                <select
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    disabled={disabled}
                    className="flex h-9 w-full items-center justify-between rounded-md border border-input bg-background px-3 py-2 text-sm shadow-sm ring-offset-background placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-ring disabled:cursor-not-allowed disabled:opacity-50 appearance-none"
                >
                    {options.map(opt => (
                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                    ))}
                </select>
                <i data-lucide="chevron-down" className="absolute right-3 top-2.5 h-4 w-4 opacity-50 pointer-events-none"></i>
            </div>
        );


        const Tabs = ({ value, onValueChange, children }) => (
            <div className="w-full">{children}</div>
        );

        const TabsList = ({ children }) => (
            <div className="inline-flex h-9 items-center justify-center rounded-lg bg-muted p-1 text-muted-foreground w-full mb-4">
                {children}
            </div>
        );

        const TabsTrigger = ({ value, currentValue, onClick, children }) => (
            <button
                onClick={() => onClick(value)}
                className={cn(
                    "inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1 text-sm font-medium ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex-1",
                    currentValue === value ? "bg-background text-foreground shadow" : "hover:bg-background/50"
                )}
            >
                {children}
            </button>
        );




        const SourceSheetSelector = ({ selected, onChange }) => {
            const [sheets, setSheets] = useState([]);

            useEffect(() => {
                google.script.run.withSuccessHandler(setSheets).getJiraSheets();
            }, []);

            return (
                <div className="space-y-1">
                    <Label>Source Sheet</Label>
                    <Select
                        value={selected || ""}
                        onChange={(val) => onChange(val)}
                        options={[
                            { value: "", label: "Active Sheet (Default)" },
                            ...sheets.map(s => ({ value: s, label: s }))
                        ]}
                    />
                </div>
            );
        };

        const AccordionItem = ({ title, children, defaultOpen = false }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="border rounded-lg bg-card text-card-foreground shadow-sm">
                    <button
                        onClick={() => setIsOpen(!isOpen)}
                        className="flex w-full items-center justify-between p-3 text-sm font-medium transition-all hover:bg-muted/50 rounded-t-lg"
                    >
                        <span className="text-left">{title}</span>
                        <i data-lucide="chevron-down" className={cn("h-4 w-4 shrink-0 text-muted-foreground transition-transform duration-200", isOpen ? "rotate-180" : "")}></i>
                    </button>
                    {isOpen && (
                        <div className="p-3 pt-0 text-xs text-muted-foreground border-t">
                            {children}
                        </div>
                    )}
                </div>
            );
        };

        const Alert = ({ type, children, className, action }) => {
            const styles = {
                error: "bg-red-50 text-red-900 border-red-200",
                success: "bg-green-50 text-green-900 border-green-200",
                info: "bg-blue-50 text-blue-900 border-blue-200"
            };
            return (
                <div className={cn("p-3 rounded-md text-xs border flex items-center justify-between", styles[type], className)}>
                    <div>{children}</div>
                    {action && (
                        <button
                            className="ml-2 font-bold underline hover:no-underline whitespace-nowrap"
                            onClick={action.onClick}
                        >
                            {action.label}
                        </button>
                    )}
                </div>
            )
        };

        const Tooltip = ({ text, children }) => {
            const [visible, setVisible] = useState(false);
            return (
                <div className="relative flex items-center" onMouseEnter={() => setVisible(true)} onMouseLeave={() => setVisible(false)}>
                    {children}
                    {visible && (
                        <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 px-2 py-1 bg-black text-white text-[10px] rounded whitespace-nowrap z-50">
                            {text}
                        </div>
                    )}
                </div>
            );
        };
        // CHECKOUT PANEL COMPONENT
        const CheckoutPanel = ({ email, plan, priceId, price, domain, seats, onCancel, onSuccess, setStatus }) => {
            const [loading, setLoading] = useState(false);
            const [stripe, setStripe] = useState(null);
            const [elements, setElements] = useState(null);
            const [clientSecret, setClientSecret] = useState(null);

            useEffect(() => {
                // Initialize Stripe
                if (window.Stripe) {
                    setStripe(window.Stripe('pk_live_placeholder')); // User will replace or we'll fetch
                }
            }, []);

            const handlePay = async (e) => {
                if (e) e.preventDefault();

                // Open window immediately to avoid popup blockers
                const checkoutWindow = window.open('about:blank', '_blank');
                if (!checkoutWindow) {
                    setStatus({ type: 'error', text: 'Popup blocked! Please allow popups to continue to payment.' });
                    return;
                }
                checkoutWindow.document.write('<!DOCTYPE html><html><head><title>Redirecting...</title><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f8fafc;color:#1e293b;}</style></head><body><div style="text-align:center;"><p>Redirecting to Secure Checkout...</p></div></body></html>');

                setLoading(true);
                try {
                    const workerUrl = CLOUDFLARE_WORKER_URL;
                    const res = await fetch(`${workerUrl}/api/stripe/create-session`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: USER_EMAIL,
                            plan,
                            priceId,
                            domain: domain,
                            seats: seats
                        })
                    });
                    const data = await res.json();

                    if (data.url) {
                        checkoutWindow.location.href = data.url;
                    } else if (data.error) {
                        checkoutWindow.close();
                        const errorDetails = `Checkout Creation Error: ${data.error}\nParams: ${JSON.stringify({ plan, priceId, domain, seats })}`;
                        google.script.run.logRefreshAttempt('ERROR', errorDetails, 'Checkout');
                        setStatus({ type: 'error', text: 'Stripe Error: ' + data.error + '. See "☰ Logs" for details.' });
                    }
                } catch (err) {
                    if (checkoutWindow) checkoutWindow.close();
                    const errorDetails = `Failed to start checkout: ${err.message}\nStack: ${err.stack || 'N/A'}`;
                    google.script.run.logRefreshAttempt('ERROR', errorDetails, 'Checkout');
                    setStatus({ type: 'error', text: 'Failed to start checkout: ' + err.message + '. See "☰ Logs" for details.' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="space-y-4 p-4 border rounded-xl bg-white shadow-sm animation-slide-up">
                    <div className="flex items-center justify-between border-b pb-2">
                        <h3 className="font-bold flex items-center gap-2">
                            <i data-lucide="credit-card" className="w-4 h-4 text-primary"></i>
                            Secure Checkout
                        </h3>
                        <button onClick={onCancel} className="text-muted-foreground hover:text-foreground">
                            <i data-lucide="x" className="w-4 h-4"></i>
                        </button>
                    </div>

                    <div className="bg-slate-50 p-3 rounded-lg text-xs space-y-2">
                        <div className="flex justify-between">
                            <span className="text-muted-foreground">Product</span>
                            <span className="font-medium">Jira Sync {plan === 'individual' ? 'Pro' : 'Organization'}</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-muted-foreground">Total</span>
                            <span className="font-bold text-primary">{price}</span>
                        </div>
                    </div>

                    <div className="space-y-3">
                        <div className="flex items-start gap-2 p-3 bg-blue-50 rounded-lg border border-blue-100 italic">
                            <i data-lucide="info" className="w-4 h-4 text-blue-600 mt-0.5 shrink-0"></i>
                            <p className="text-[10px] text-blue-800 leading-tight">
                                You will be securely redirected to Stripe's payment page to complete your purchase.
                            </p>
                        </div>

                        <Button className="w-full" onClick={handlePay} disabled={loading}>
                            {loading ? (
                                <><span className="animate-spin mr-2">⏳</span> Processing...</>
                            ) : (
                                <><i data-lucide="lock" className="w-4 h-4 mr-2"></i> Pay {price}</>
                            )}
                        </Button>

                        <Button className="w-full" variant="outline" onClick={onCancel} disabled={loading}>
                            <i data-lucide="arrow-left" className="w-4 h-4 mr-2"></i>
                            Back to Plans
                        </Button>

                        <p className="text-[10px] text-center text-muted-foreground flex items-center justify-center gap-1">
                            <i data-lucide="shield-check" className="w-3 h-3"></i>
                            Secure payments by Stripe
                        </p>
                    </div>
                </div>
            );
        };

        // LICENSE PANEL COMPONENT
        const LicensePanel = ({ license, setLicense, setStatus, loadLicenseInfo }) => {
            const [pricing, setPricing] = useState(null);
            const [loading, setLoading] = useState(false);
            const [purchaseType, setPurchaseType] = useState('individual');
            const [domainInput, setDomainInput] = useState('');
            const [seatsInput, setSeatsInput] = useState(10);
            const [billingCycle, setBillingCycle] = useState('yearly');
            const [showCheckout, setShowCheckout] = useState(false);
            const [selectedPriceId, setSelectedPriceId] = useState(null);
            const [selectedPrice, setSelectedPrice] = useState(null);

            useEffect(() => {
                loadPricing();
                if (USER_EMAIL) {
                    const emailDomain = USER_EMAIL.split('@')[1];
                    setDomainInput(emailDomain || '');
                }
            }, []);

            const loadPricing = () => {
                google.script.run
                    .withSuccessHandler(setPricing)
                    .withFailureHandler(() => { })
                    .getPricingInfo();
            };

            const handleUpgrade = () => {
                const selectedPricing = pricing[purchaseType];
                if (!selectedPricing) return;

                const planData = billingCycle === 'yearly' ? selectedPricing.yearly : selectedPricing.monthly;

                const priceId = planData?.priceId;

                if (!priceId) {
                    setStatus({ type: 'error', text: 'Pricing configuration missing.' });
                    return;
                }

                // Domain/Enterprise validation
                if ((purchaseType === 'domain' || purchaseType === 'enterprise') && (!domainInput || !domainInput.includes('.'))) {
                    setStatus({ type: 'error', text: 'Please enter a valid company domain.' });
                    return;
                }

                let finalPrice = planData.price;
                if (purchaseType === 'domain') {
                    const unitPrice = planData.value;
                    const total = unitPrice * seatsInput;
                    finalPrice = `$${total}/${billingCycle === 'yearly' ? 'year' : 'month'} (${seatsInput} seats)`;
                }

                // Use the checkout panel
                setSelectedPriceId(priceId);
                setSelectedPrice(finalPrice);
                setShowCheckout(true);
            };

            const handleCheckoutSuccess = () => {
                setShowCheckout(false);
                setStatus({ type: 'success', text: 'Payment successful! Updating license...' });
                // In a real app, the webhook would update KV. 
                // We'll mock a success by reloading license info after a delay.
                setTimeout(() => loadLicenseInfo(true), 3000);
            };

            const handleManageSubscription = () => {
                setStatus({ type: 'info', text: 'Opening subscription portal...' });
                google.script.run
                    .withSuccessHandler((result) => {
                        if (result.url) {
                            window.open(result.url, '_blank');
                            setStatus({ type: 'success', text: 'Portal opened in new tab' });
                        }
                    })
                    .withFailureHandler((err) => {
                        setStatus({ type: 'error', text: err.message });
                    })
                    .createManageSubscriptionSession();
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center py-12">
                        <div className="animate-spin w-8 h-8 border-2 border-primary border-t-transparent rounded-full"></div>
                    </div>
                );
            }

            if (showCheckout) {
                return (
                    <CheckoutPanel
                        email={license?.email}
                        plan={purchaseType}
                        priceId={selectedPriceId}
                        price={selectedPrice}
                        domain={domainInput}
                        seats={seatsInput}
                        onCancel={() => setShowCheckout(false)}
                        onSuccess={handleCheckoutSuccess}
                        setStatus={setStatus}
                    />
                );
            }

            const isPro = license?.allowed && license?.plan !== 'free';

            return (
                <div className="space-y-4 animation-fade-in">
                    {/* Header */}
                    <div className="text-center py-4">
                        <i data-lucide="crown" className="w-12 h-12 mx-auto mb-2 text-yellow-500"></i>
                        <h2 className="text-lg font-bold">License Information</h2>
                        <p className="text-sm text-muted-foreground">Manage your subscription</p>
                        {!USER_EMAIL && (
                            <div className="mt-2 text-red-500 text-xs font-medium">
                                <i data-lucide="alert-circle" className="w-3 h-3 inline mr-1"></i>
                                Google account email not detected!
                            </div>
                        )}
                    </div>

                    {/* Current License Status */}
                    <div className={cn(
                        "p-4 rounded-lg border-2",
                        isPro ? "border-yellow-400 bg-yellow-50" : "border-gray-200 bg-gray-50"
                    )}>
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-xs font-medium text-muted-foreground uppercase">Current Plan</span>
                            <span className={cn(
                                "px-2 py-1 rounded text-xs font-bold uppercase",
                                isPro ? "bg-yellow-400 text-yellow-900" : "bg-gray-200 text-gray-600"
                            )}>
                                {license?.plan || 'Free'}
                            </span>
                        </div>

                        <div className="space-y-2 text-sm">
                            <div className="flex justify-between">
                                <span className="text-muted-foreground">Email:</span>
                                <span className="font-medium truncate ml-2">{license?.email || USER_EMAIL || 'Unknown'}</span>
                            </div>

                            {license?.licenseType === 'domain' && (
                                <div className="flex justify-between">
                                    <span className="text-muted-foreground">License Type:</span>
                                    <span className="font-medium">Domain ({license.domain})</span>
                                </div>
                            )}

                            {license?.status && license.status !== 'none' && (
                                <div className="flex justify-between">
                                    <span className="text-muted-foreground">Status:</span>
                                    <span className={cn(
                                        "font-medium",
                                        license.status === 'active' ? "text-green-600" :
                                            license.status === 'trialing' ? "text-blue-600" : "text-red-600"
                                    )}>
                                        {license.status.charAt(0).toUpperCase() + license.status.slice(1)}
                                    </span>
                                </div>
                            )}

                            {license?.expiresAt && (
                                <div className="flex justify-between">
                                    <span className="text-muted-foreground">Renews:</span>
                                    <span className="font-medium">{new Date(license.expiresAt).toLocaleDateString()}</span>
                                </div>
                            )}

                            {license?.seats && (
                                <div className="flex justify-between">
                                    <span className="text-muted-foreground">Seats:</span>
                                    <span className="font-medium">{license.usedSeats || 0} / {license.seats}</span>
                                </div>
                            )}
                        </div>

                        {/* Features List */}
                        {isPro && license?.features?.length > 0 && (
                            <div className="mt-3 pt-3 border-t">
                                <p className="text-xs font-medium text-muted-foreground mb-2">Included Features:</p>
                                <div className="flex flex-wrap gap-1">
                                    {license.features.filter(f => !f.startsWith('EC365')).map((f, i) => (
                                        <span key={i} className="px-2 py-0.5 bg-white rounded text-xs border">
                                            {f.replace(/_/g, ' ')}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        )}

                    </div>

                    {/* Pro Actions */}
                    {
                        isPro ? (
                            <div className="space-y-2">
                                <Button className="w-full" variant="outline" onClick={handleManageSubscription}>
                                    <i data-lucide="settings" className="w-4 h-4 mr-2"></i>
                                    Manage Subscription
                                </Button>
                            </div>
                        ) : (
                            /* Upgrade Section */
                            <div className="space-y-4">
                                <div className="text-center">
                                    <h3 className="font-bold text-lg">Upgrade to Pro</h3>
                                    <p className="text-sm text-muted-foreground">Unlock all features</p>
                                </div>

                    const field = availableFields.find(f => f.id === c || f.key === c || f.name === c) || { id: c, name: c, key: c };

                    return name.includes(s) || key.includes(s);

            const toggleField = (field) => {
                const exists = selected.find(s => s.id === field.id || (s.key && s.key === field.key));

                    setSelected(selected.filter(s => (s.id !== field.id) && (!s.key || s.key !== field.key)));
                } else {
                    setSelected([...selected, field]);

            };

            const removeField = (field) => {
                setSelected(selected.filter(s => (s.id !== field.id) && (!s.key || s.key !== field.key)));
            };

            const handleSave = () => {
                onSave(selected.map(s => s.id || s.key || s.name).join(', '));

                                    <button

        const SYSTEM_FILTERS = [
            { name: "My Open Issues", jql: "assignee = currentUser() AND resolution = Unresolved order by updated DESC" },

                    if (!res.ok) {

                    // Success detection: if we were checking or free and now have a plan
                    const upgraded = (license.plan === 'Checking...' || license.plan === 'free') && (data.plan && data.plan !== 'free');

            const handleRefresh = (trigger = 'Manual', force = false, configOverride = null) => {

                const startTime = Date.now();
                google.script.run
                    .withSuccessHandler((res) => {

                        if (res.limited) {

            const handleGlobalRefresh = (trigger = 'Interval') => {

                setIsRefreshing(true);
                setStatus({ type: 'info', text: 'Global Refresh: Updating all Jira sheets...' });
                const isPro = license?.allowed && license?.plan !== 'free';

                const startTime = Date.now();
                google.script.run
                    .withSuccessHandler((res) => {

                        setTimeout(() => setIsRefreshing(false), 3000);

                        if (res.limited) {
                            setStatus({
                                type: 'error',
                                text: 'Global Sync reached 150 issue limit on some sheets. Please upgrade to Pro.',
                                action: { label: 'Upgrade to Pro', onClick: () => setActiveTab('license') }
                            });
                        } else {
                            setStatus({

                            });

                    })

            };

            const handleUpdate = () => {
                setStatus({ type: 'info', text: 'Validating and processing...' });
                const isPro = license?.allowed && license?.plan !== 'free';

                google.script.run
                    .withSuccessHandler((data) => {
                        let updates = data.updates || [];
                        let creates = data.creates || [];
                        let isLimited = false;

                        if (!isPro && (updates.length + creates.length) > 150) {
                            if (updates.length > 150) {
                                updates = updates.slice(0, 150);
                                creates = [];
                            } else {
                                creates = creates.slice(0, 150 - updates.length);
                            }
                            isLimited = true;
                        }

                        if (!updates.length && !creates.length) {
                            setStatus({ type: 'info', text: 'No rows to process.' });
                            return;
                        }

                        // Process Updates with Instant Feedback (Chunked Sidebar Loop)
                        if (updates.length > 0) {
                            let updatedCount = 0;
                            let cellsUpdated = 0;
                            const CHUNK_SIZE = 100;

                            const totalCells = updates.reduce((sum, u) => sum + Object.keys(u.fields || {}).length, 0);
                            setStatus({ type: 'info', text: `calculating cells that neeed to be updated: ${totalCells}` });

                            const processUpdateChunks = (allUpdates, startIndex = 0) => {
                                const chunk = allUpdates.slice(startIndex, startIndex + CHUNK_SIZE);
                                if (chunk.length === 0) {
                                    const cellText = cellsUpdated ? ` (${cellsUpdated} cells/fields)` : '';
                                    if (isLimited) {
                                        setStatus({
                                            type: 'error',
                                            text: 'Free version allows 150 updates. Please upgrade to Pro.',
                                            action: { label: 'Upgrade to Pro', onClick: () => setActiveTab('license') }
                                        });
                                    } else {
                                        setStatus({ type: 'success', text: `Updated ${updatedCount} issues${cellText}.` });
                                    }
                                    return;
                                }

                                const endIdx = Math.min(startIndex + CHUNK_SIZE, allUpdates.length);
                                const progressMsg = `Updating Batch ${Math.floor(startIndex / CHUNK_SIZE) + 1}: ${startIndex + 1} to ${endIdx} of ${allUpdates.length}...`;
                                setStatus({ type: 'info', text: progressMsg });

                                google.script.run
                                    .withSuccessHandler(res => {
                                        if (res.success) {
                                            updatedCount += (res.count || 0);
                                            cellsUpdated += (res.cellsUpdated || 0);
                                            processUpdateChunks(allUpdates, startIndex + CHUNK_SIZE);
                                        } else {
                                            setStatus({ type: 'error', text: 'Update error: ' + (res.error || 'Unknown error') });
                                        }
                                    })
                                    .withFailureHandler(err => setStatus({ type: 'error', text: 'Batch failed: ' + err.message }))
                                    .updateJiraIssuesDirect({ ...config, isPro }, chunk, { sheetName: data.sheetName });
                            };

                            setTimeout(() => {
                                processUpdateChunks(updates, 0);
                            }, 1200);
                        }

                        // Process Creates
                        if (creates.length > 0) {
                            setStatus({ type: 'info', text: `Creating ${creates.length} issues...` });
                            google.script.run
                                .withSuccessHandler(res => {
                                    // Format success message: "Created 5 issues: 3 Bug, 2 Story"
                                    const typeSummary = Object.entries(res.types || {})
                                        .map(([type, count]) => `${count} ${type}`)

                                    handleRefresh();

                                .createJiraIssues(config, creates);
                        }

            const handleToggleSchedule = () => {

                } else {

            // Interval Timer Effect - Countdown based
            useEffect(() => {
                if (isIntervalRunning) {
                    // Pause if refreshing
                    if (isRefreshing) return;

                    // Reset if cycle complete
                    if (countdown <= 0) {
                        setCountdown(intervalSeconds);

                    }

                    const timer = setInterval(() => {
                        setCountdown(prev => {

                            }

            }, [isIntervalRunning, intervalSeconds, isRefreshing, countdown]);

            const handleSmartFetch = (ctxConfig, updateCtxFn, extraRequired = []) => {
                const requiredCols = ['created', 'updated', 'resolutiondate', 'issuetype', ...extraRequired];
                const current = (ctxConfig.columns || '').split(',').map(c => c.trim().toLowerCase());

                // Identify missing columns
                const missing = [];
                requiredCols.forEach(req => {
                    const reqLower = req.toLowerCase();
                    // Check if already present
                    if (!current.some(c => c.includes(reqLower))) {
                        // Find matching field in availableFields if possible
                        if (availableFields.length > 0) {
                            const field = availableFields.find(f =>
                                f.name.toLowerCase() === reqLower ||
                                f.name.toLowerCase().includes(reqLower)
                            );
                            if (field && !current.some(c => c.includes(field.name.toLowerCase()))) {
                                missing.push(field.name);
                            } else if (!field) {
                                // If not found in availableFields, just add the required name string if it's common
                                if (['story points', 'timeoriginalestimate'].includes(reqLower)) {
                                    missing.push(req);
                                }
                            }
                        } else {
                            missing.push(req);
                        }
                    }
                });

                let finalConfig = { ...config, ...ctxConfig };
                // CRITICAL FIX: Do not let an empty 'jql' or 'columns' from ctxConfig overwrite 
                // the active config if ctxConfig is in its initial/empty state.
                if (!ctxConfig.jql && config.jql) {
                    finalConfig.jql = config.jql;
                }

                if (missing.length > 0) {
                    const uniqueMissing = [...new Set(missing)];
                    const newCols = (ctxConfig.columns ? ctxConfig.columns + ', ' : '') + uniqueMissing.join(', ');
                    updateCtxFn('columns', newCols);
                    finalConfig.columns = newCols;
                    setStatus({ type: 'info', text: `Adding missing columns: ${uniqueMissing.join(', ')}` });
                    handleRefresh('SmartFetch', true, finalConfig);
                    return true; // We triggered a refresh
                } else {
                    handleRefresh('Manual', false, finalConfig);
                    return false;
                }
            };

            const sectionTitles = {
                config: { title: 'JIRA Configuration', icon: 'settings' },
                issues: { title: 'JIRA Issues', icon: 'list' },
                bulkCreate: { title: 'Bulk Create Issues', icon: 'plus-circle' },
                dashboard: { title: 'Dashboards', icon: 'pie-chart' },
                metrics: { title: 'Metrics', icon: 'line-chart' },
                roadmap: { title: 'Roadmap Planning', icon: 'gantt-chart' },
                capacity: { title: 'Capacity Planning', icon: 'users' },

                                            config.columns
                                }
                                onSave={(cols) => {
                                    if (targetConfigMode === 'dashboard') setDashboardConfig(p => ({ ...p, columns: cols }));
                                    else if (targetConfigMode === 'metrics') setMetricsConfig(p => ({ ...p, columns: cols }));
                                    else updateConfig('columns', cols);
                                    setShowColumnModal(false);
                                }}
                                onCancel={() => setShowColumnModal(false)}
                            />
                        )
                    }
                </div >
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 text-red-600 bg-red-50 border border-red-200 rounded h-screen">
                            <h2 className="font-bold mb-2">Something went wrong.</h2>
                            <details className="text-xs font-mono whitespace-pre-wrap">
                                <summary>Error Details</summary>
                                {this.state.error && this.state.error.toString()}
                            </details>
                            <button
                                onClick={() => window.location.reload()}
                                className="mt-4 px-3 py-1 bg-red-100 hover:bg-red-200 text-red-800 rounded text-xs"
                            >
                                Reload Sidebar
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>

</html>
