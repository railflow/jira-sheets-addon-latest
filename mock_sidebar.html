                                                <Input type="number" className="w-full text-center font-mono" min="5"
                                                    value={isIntervalRunning ? countdown : intervalSeconds}
                                                    onChange={(e) => setIntervalSeconds(parseInt(e.target.value) || 30)}
                                                    disabled={isIntervalRunning}
                                                />
                                                <span className="text-sm w-24">seconds</span>
                                            </div>
                                            <Button
                                                variant={isIntervalRunning ? "destructive" : "secondary"}
                                                className="w-full"
                                                onClick={handleToggleSchedule}
                                            >
                                                {isIntervalRunning ? (
                                                    <><i data-lucide="pause" className="w-4 h-4 mr-2"></i>Stop Timer</>
                                                ) : (
                                                    <><i data-lucide="timer" className="w-4 h-4 mr-2"></i>Start Timer</>
                                                )}
                                            </Button>
                                            <p className="text-[10px] text-muted-foreground">Applies only while this sidebar is open. Default: 30s.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DASHBOARD TAB */}
                    {activeTab === 'dashboard' && (
                        <div className="space-y-4 animation-fade-in">
                            <div className="text-center py-4">
                                <i data-lucide="pie-chart" className="w-12 h-12 mx-auto text-blue-500 mb-2"></i>
                                <h2 className="text-lg font-bold">Dashboard & Metrics</h2>
                                <p className="text-sm text-muted-foreground">Generate visual charts from your Jira data</p>
                            </div>

                            <div className="space-y-4">
                                <div className="space-y-2">
                                    <Label>Select Columns to Visualize</Label>
                                    {sheetHeaders.length === 0 ? (
                                        <div className="p-4 text-center text-sm text-muted-foreground border rounded-md">
                                            <p>No columns found. Fetch Jira data first.</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-1 p-2 border rounded-md bg-muted/30 max-h-[200px] overflow-y-auto">
                                            {sheetHeaders.filter(h => h !== 'key' && h !== 'Key').map(col => (
                                                <label key={col} className="flex items-center gap-2 text-xs cursor-pointer hover:bg-accent/50 p-1 rounded">
                                                    <input
                                                        type="checkbox"
                                                        checked={dashboardColumns.includes(col)}
                                                        onChange={(e) => {
                                                            if (e.target.checked) {
                                                                setDashboardColumns(prev => [...prev, col]);
                                                            } else {
                                                                setDashboardColumns(prev => prev.filter(c => c !== col));
                                                            }
                                                        }}
                                                        className="rounded"
                                                    />
                                                    <span className="truncate" title={col}>{col}</span>
                                                </label>
                                            ))}
                                        </div>
                                    )}
                                    <p className="text-[10px] text-muted-foreground">
                                        Selected: {dashboardColumns.length} columns
                                    </p>
                                </div>

                                <div className="space-y-2">
                                    <Label>Chart Type</Label>
                                    <select
                                        className="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm"
                                        value={dashboardType}
                                        onChange={(e) => setDashboardType(e.target.value)}
                                    >
                                        <option value="pie">Pie Chart</option>
                                        <option value="donut">Donut Chart</option>
                                        <option value="bar">Bar Chart</option>
                                    </select>
                                </div>

                                <Button className="w-full" variant="secondary" onClick={handleGenerateDashboard}>
                                    <i data-lucide="pie-chart" className="w-4 h-4 mr-2"></i>
                                    Generate Dashboard
                                </Button>

                                <Alert type="info">
                                    Charts are rendered to the right of your data. Columns with too many unique values may be skipped.
                                </Alert>
                            </div>
                        </div>
                    )}

                    {/* ROADMAP TAB */}
                    {activeTab === 'roadmap' && (
                        <div className="space-y-4 animation-fade-in">
                            <div className="text-center py-4">
                                <i data-lucide="gantt-chart" className="w-12 h-12 mx-auto text-green-500 mb-2"></i>
                                <h2 className="text-lg font-bold">Roadmap Planning</h2>
                                <p className="text-sm text-muted-foreground">Visualize your issues on a timeline</p>
                            </div>

                            <div className="space-y-4">
                                <Button className="w-full" variant="secondary" onClick={handleGenerateRoadmap}>
                                    <i data-lucide="gantt-chart" className="w-4 h-4 mr-2"></i>
                                    Generate Roadmap
                                </Button>

                                <Alert type="info">
                                    Creates a "Jira Roadmap" sheet with a Gantt-style timeline showing:
                                    <ul className="list-disc ml-4 mt-1 text-xs">
                                        <li>Issues positioned by created/due dates</li>
                                        <li>Color-coded by status (To Do, In Progress, Done)</li>
                                        <li>Today marker and week labels</li>
                                    </ul>
                                </Alert>
                            </div>
                        </div>
                    )}

                    {/* CAPACITY TAB */}
                    {activeTab === 'capacity' && (
                        <div className="space-y-4 animation-fade-in">
                            <div className="text-center py-4">
                                <i data-lucide="users" className="w-12 h-12 mx-auto text-purple-500 mb-2"></i>
                                <h2 className="text-lg font-bold">Capacity Planning</h2>
                                <p className="text-sm text-muted-foreground">Team workload & availability analysis</p>
                            </div>

                            <div className="space-y-3">
                                <div className="space-y-1">
                                    <Label>Estimation Type</Label>
                                    <select
                                        className="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm"
                                        value={capacityConfig.estimationType}
                                        onChange={(e) => setCapacityConfig({ ...capacityConfig, estimationType: e.target.value })}
                                    >
                                        <option value="storypoints">Story Points</option>
                                        <option value="hours">Hours (Time Estimate)</option>
                                    </select>
                                </div>

                                {capacityConfig.estimationType === 'storypoints' && (
                                    <div className="space-y-1">
                                        <Label>Hours per Story Point</Label>
                                        <Input
                                            type="number"
                                            min="1"
                                            value={capacityConfig.hoursPerPoint}
                                            onChange={(e) => setCapacityConfig({ ...capacityConfig, hoursPerPoint: parseInt(e.target.value) || 8 })}
                                        />
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-2">
                                    <div className="space-y-1">
                                        <Label>Hours/Week</Label>
                                        <Input
                                            type="number"
                                            min="1"
                                            max="168"
                                            value={capacityConfig.hoursPerWeek}
                                            onChange={(e) => setCapacityConfig({ ...capacityConfig, hoursPerWeek: parseInt(e.target.value) || 40 })}
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <Label>Capacity %</Label>
                                        <Input
                                            type="number"
                                            min="1"
                                            max="100"
                                            value={capacityConfig.capacityPercent}
                                            onChange={(e) => setCapacityConfig({ ...capacityConfig, capacityPercent: parseInt(e.target.value) || 80 })}
                                        />
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <Label>Weeks Ahead</Label>
                                    <Input
                                        type="number"
                                        min="1"
                                        max="52"
                                        value={capacityConfig.weeksAhead}
                                        onChange={(e) => setCapacityConfig({ ...capacityConfig, weeksAhead: parseInt(e.target.value) || 8 })}
                                    />
                                </div>

                                <div className="space-y-1">
                                    <Label>Holidays (comma-separated)</Label>
                                    <Input
                                        placeholder="2024-12-25, 2024-01-01"
                                        value={capacityConfig.holidays}
                                        onChange={(e) => setCapacityConfig({ ...capacityConfig, holidays: e.target.value })}
                                    />
                                    <p className="text-[10px] text-muted-foreground">Format: YYYY-MM-DD</p>
                                </div>

                                <Button className="w-full" variant="secondary" onClick={handleGenerateCapacity}>
                                    <i data-lucide="bar-chart-2" className="w-4 h-4 mr-2"></i>
                                    Generate Capacity Plan
                                </Button>

                                <Alert type="info">
                                    Creates a heat-map showing team utilization per week with color coding from green (healthy) to red (overloaded).
                                </Alert>
                            </div>
                        </div>
                    )}

                    {/* LICENSE TAB */}
                    {activeTab === 'license' && (
                        <LicensePanel setStatus={setStatus} />
                    )}

                    {/* Global Status Footer */}
                    {status && (
                        <div className="pt-2">
                            <Alert
                                key={status.id || status.text}
                                type={status.type}
                                className="animate-flash"
                            >
                                {status.text}
                            </Alert>
                        </div>
                    )}


                    {
                        showColumnModal && (
                            <ColumnSelector
                                availableFields={availableFields}
                                currentColumns={config.columns}
                                onSave={(cols) => {
                                    updateConfig('columns', cols);
                                    setShowColumnModal(false);
                                }}
                                onCancel={() => setShowColumnModal(false)}
                            />
                        )
                    }
                </div >
            );
        }; // Close App component

        // Marketing Asset Layout - Matches reference style
        const MarketingLayout = () => {
            const params = new URLSearchParams(window.location.search);
            const color = params.get('color') || 'blue';
            const title = decodeURIComponent(params.get('title') || 'Feature Title');
            const desc = decodeURIComponent(params.get('desc') || 'Feature description goes here.');
            const feature = params.get('feature') || 'config';

            const bgColor = color === 'blue' ? '#4285F4' : '#0F9D58';

            // Sample spreadsheet data
            const sheetData = [
                ['PROJ-101', 'Login Bug', 'Done', 'High', 'john@acme.com'],
                ['PROJ-102', 'Dashboard Performance', 'In Progress', 'Medium', 'jane@acme.com'],
                ['PROJ-103', 'API Endpoint', 'To Do', 'Critical', 'mike@acme.com'],
                ['PROJ-104', 'User Profile Update', 'In Review', 'Low', 'sara@acme.com'],
                ['PROJ-105', 'Search Feature', 'In Progress', 'Medium', 'alex@acme.com'],
                ['PROJ-106', 'Export to PDF', 'Done', 'High', 'john@acme.com'],
                ['PROJ-107', 'Email Notifications', 'To Do', 'Medium', 'jane@acme.com'],
                ['PROJ-108', 'Dark Mode', 'In Progress', 'Low', 'mike@acme.com'],
            ];
            const headers = ['Key', 'Summary', 'Status', 'Priority', 'Assignee'];

            return (
                <div className="flex w-full h-screen overflow-hidden" style={{ fontFamily: 'system-ui, -apple-system, sans-serif' }}>
                    {/* Left: Product Screenshot (~65%) */}
                    <div className="flex-1 bg-gray-100 p-0 flex items-stretch">
                        <div className="w-full flex flex-col shadow-xl">
                            {/* Google Sheets Header Bar */}
                            <div className="bg-white border-b px-4 py-2 flex items-center gap-4">
                                <img src="https://www.gstatic.com/images/branding/product/1x/sheets_2020q4_48dp.png" className="w-8 h-8" alt="Sheets" />
                                <div className="flex-1">
                                    <div className="text-sm font-medium text-gray-800">Jira Project Tracker</div>
                                    <div className="text-xs text-gray-500">File Edit View Insert Format Data Tools Extensions Help</div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button className="bg-[#1a73e8] text-white text-sm px-4 py-1.5 rounded-md flex items-center gap-1">
                                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z" /></svg>
                                        Share
                                    </button>
                                </div>
                            </div>

                            {/* Spreadsheet Content */}
                            <div className="flex-1 flex bg-white overflow-hidden">
                                {/* Sheet Grid */}
                                <div className="flex-1 flex flex-col">
                                    {/* Column Headers */}
                                    <div className="flex border-b bg-gray-50">
                                        <div className="w-10 h-7 border-r bg-gray-100 flex items-center justify-center"></div>
                                        {['A', 'B', 'C', 'D', 'E', 'F'].map(col => (
                                            <div key={col} className="w-28 h-7 border-r flex items-center justify-center text-xs text-gray-600 font-medium">{col}</div>
                                        ))}
                                    </div>
                                    {/* Header Row */}
                                    <div className="flex border-b bg-blue-50">
                                        <div className="w-10 h-7 border-r bg-gray-100 flex items-center justify-center text-xs text-gray-500">1</div>
                                        {headers.map((h, i) => (
                                            <div key={i} className="w-28 h-7 border-r flex items-center px-2 text-xs font-semibold text-gray-700">{h}</div>
                                        ))}
                                        <div className="w-28 h-7 border-r"></div>
                                    </div>
                                    {/* Data Rows */}
                                    {sheetData.map((row, rowIdx) => (
                                        <div key={rowIdx} className="flex border-b hover:bg-blue-50/30">
                                            <div className="w-10 h-6 border-r bg-gray-50 flex items-center justify-center text-xs text-gray-500">{rowIdx + 2}</div>
                                            {row.map((cell, colIdx) => (
                                                <div key={colIdx} className="w-28 h-6 border-r flex items-center px-2 text-xs text-gray-700 truncate">{cell}</div>
                                            ))}
                                            <div className="w-28 h-6 border-r"></div>
                                        </div>
                                    ))}
                                    {/* Empty rows */}
                                    {[...Array(12)].map((_, i) => (
                                        <div key={i} className="flex border-b">
                                            <div className="w-10 h-6 border-r bg-gray-50 flex items-center justify-center text-xs text-gray-400">{i + 10}</div>
                                            {[...Array(6)].map((_, j) => (
                                                <div key={j} className="w-28 h-6 border-r"></div>
                                            ))}
                                        </div>
                                    ))}
                                </div>

                                {/* Add-on Sidebar */}
                                <div className="w-[340px] border-l shadow-lg bg-white flex flex-col">
                                    {/* Sidebar Header */}
                                    <div className="bg-[#1a73e8] text-white px-4 py-3 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                                            <span className="font-medium text-sm">Jira Sync for Sheets</span>
                                        </div>
                                        <button className="text-white/80 hover:text-white">×</button>
                                    </div>
                                    {/* Sidebar Content */}
                                    <div className="flex-1 overflow-y-auto">
                                        <App initialTab={feature} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Right: Colored Panel with Text (~35%) */}
                    <div className="w-[420px] flex flex-col justify-center px-12 py-16" style={{ backgroundColor: bgColor }}>
                        <h1 className="text-white text-4xl font-bold mb-6 leading-tight">{title}</h1>
                        <p className="text-white/90 text-lg leading-relaxed">{desc}</p>
                    </div>
                </div>
            );
        };

        const Main = () => {
            const params = new URLSearchParams(window.location.search);
            const isMarketing = params.get('mode') === 'marketing';
            return isMarketing ? <MarketingLayout /> : <App />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>

</html>
