<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <title>Complete Purchase - Jira Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function handlePayment() {
            const btn = document.getElementById('pay-btn');
            const status = document.getElementById('status');
            const form = document.getElementById('payment-form');
            const success = document.getElementById('success-message');

            btn.disabled = true;
            btn.innerText = 'Processing...';
            status.innerText = '';

            // Extract data from template variables injected by Code.gs
            const email = "<?= email ?>";
            const plan = "<?= plan ?>";

            // Simulate API delay
            setTimeout(() => {
                google.script.run
                    .withSuccessHandler((res) => {
                        if (res.success) {
                            form.classList.add('hidden');
                            success.classList.remove('hidden');
                            status.innerText = '';
                        } else {
                            status.innerText = 'Error: ' + res.message;
                            status.className = 'text-red-500 text-sm mt-2 text-center';
                            btn.disabled = false;
                            btn.innerText = 'Pay Now';
                        }
                    })
                    .withFailureHandler((err) => {
                        status.innerText = 'System Error: ' + err.message;
                        status.className = 'text-red-500 text-sm mt-2 text-center';
                        btn.disabled = false;
                        btn.innerText = 'Pay Now';
                    })
                    .processMockPayment(email, plan);
            }, 1000);
        }
    </script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold">Jira Sync for Sheets</h1>
            <p class="text-blue-100 text-sm">Secure Checkout (Mock)</p>
        </div>

        <!-- Content -->
        <div class="p-6">
            <!-- Order Summary -->
            <div class="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-100">
                <h2 class="text-sm font-semibold text-gray-500 uppercase mb-2">Order Summary</h2>
                <div class="flex justify-between items-center mb-1">
                    <span class="font-medium text-gray-900">
                        <?= plan === 'individual' ? 'User License' : 'Organization License' ?>
                    </span>
                    <span class="font-bold text-gray-900">$49.00</span>
                </div>
                <div class="flex justify-between items-center text-sm text-gray-500">
                    <span>Billed Yearly</span>
                    <span>Next renewal:
                        <?= new Date(new Date().setFullYear(new Date().getFullYear() + 1)).toLocaleDateString() ?>
                    </span>
                </div>
                <div class="mt-2 pt-2 border-t border-gray-200 flex justify-between items-center">
                    <span class="font-medium text-gray-700">Total</span>
                    <span class="font-bold text-xl text-blue-600">$49.00</span>
                </div>
            </div>

            <!-- Payment Form -->
            <div id="payment-form">
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" value="<?= email ?>" disabled
                            class="w-full px-3 py-2 border rounded-md bg-gray-100 text-gray-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Card Information</label>
                        <div class="relative">
                            <input type="text" placeholder="4242 4242 4242 4242"
                                class="w-full pl-10 pr-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                <line x1="1" y1="10" x2="23" y2="10"></line>
                            </svg>
                        </div>
                        <div class="flex gap-4 mt-2">
                            <input type="text" placeholder="MM / YY"
                                class="w-1/2 px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <input type="text" placeholder="CVC"
                                class="w-1/2 px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <div id="status"></div>

                <button id="pay-btn" onclick="handlePayment()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    Pay $49.00
                </button>

                <p class="text-xs text-center text-gray-400 mt-4">
                    This is a secure 256-bit encrypted payment. Or would be if it wasn't a mock.
                </p>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="hidden text-center py-8">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Payment Successful!</h3>
                <p class="text-gray-600 text-sm mb-6">Your license has been activated. You can close this window and
                    refresh the add-on.</p>
                <button onclick="window.close()" class="text-blue-600 hover:text-blue-800 font-medium text-sm">Close
                    Window</button>
            </div>
        </div>
    </div>
</body>

</html>
