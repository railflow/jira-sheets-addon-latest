name               = "jira-proxy"
main               = "cloudflare_worker.js"
compatibility_date = "2024-03-25"

[vars]
# Non-sensitive vars here.
# Required secrets (set via `npx wrangler secret put`):
#   PROXY_SECRET            — shared secret for the Jira proxy (must also be in GAS Script Properties)
#   STRIPE_SECRET_KEY       — Stripe secret key
#   STRIPE_WEBHOOK_SECRET   — Stripe webhook signing secret
# Also set for admin_worker:
#   ADMIN_USERNAME          — admin panel username (no default)
#   ADMIN_PASSWORD          — admin panel password (no default)

# D1 database (replaces LICENSES KV for all license/login/sales data)
[[d1_databases]]
binding      = "DB"
database_name = "sheetsync-licenses"
database_id  = "80b32f3b-4c31-43d7-b9e6-2c1a9de1e5ce"

# KV for static assets only
[[kv_namespaces]]
binding = "ASSETS"
id      = "d99a0245e7fc489a86c311c27dc3b98b"
